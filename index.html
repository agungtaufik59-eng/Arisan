<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#4f46e5">
  <link rel="manifest" href="manifest.json">
  <title>Arisan App - Premium</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      background-color: #f8fafc;
    }
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #4f46e5;
      background: white;
      padding: 12px 24px;
      border-radius: 40px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      z-index: 999;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.3s ease;
      white-space: nowrap;
    }
    .offline-note {
      display: none;
    }
    @media (max-width: 600px) {
      .loading { font-size: 0.9rem; padding: 10px 20px; white-space: normal; text-align: center; width: 80%; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loadingIndicator">Memuat aplikasi...</div>
  <iframe 
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbzCvvye_fbtf2vuCOZJpsDGtatnOsdfBCXxF3gs5aUlNU1WKZjmPcQ3ACkJWvFFpWzq/exec"
    title="Aplikasi Arisan"
    allow="camera; microphone; clipboard-read; clipboard-write; contacts; geolocation; autoplay"
    allowfullscreen="true"
    loading="eager">
  </iframe>

  <script>
    // Sembunyikan loading setelah iframe selesai dimuat
    const iframe = document.getElementById('appFrame');
    const loader = document.getElementById('loadingIndicator');
    
    iframe.addEventListener('load', function() {
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.style.display = 'none';
      }, 300);
    });
    
    iframe.addEventListener('error', function() {
      loader.innerHTML = 'Gagal memuat aplikasi. Periksa koneksi internet.';
      loader.style.backgroundColor = '#fee2e2';
      loader.style.color = '#b91c1c';
      loader.style.whiteSpace = 'normal';
      loader.style.width = 'auto';
    });

    // Registrasi Service Worker untuk PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log('Service Worker registered', reg);
        }).catch(err => {
          console.log('Service Worker registration failed', err);
        });
      });
    }
  </script>
</body>
</html>
