  <title>Arisan App - Premium</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: #f8fafc;
    }
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #4f46e5;
      background: white;
      padding: 12px 24px;
      border-radius: 40px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      z-index: 999;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.3s ease;
      white-space: nowrap;
    }
    @media (max-width: 600px) {
      .loading { font-size: 0.9rem; padding: 10px 20px; white-space: normal; text-align: center; width: 80%; }
    }

    /* TOMBOL INSTALL */
    #installButton {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 24px;
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 600;
      font-size: 16px;
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
      cursor: pointer;
      z-index: 10000;
      display: none;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.2s, box-shadow 0.2s;
      pointer-events: auto;
    }
    #installButton:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(79, 70, 229, 0.4);
    }
    #installButton:active {
      transform: translateY(0);
    }
    #installButton::before {
      content: "📲";
      font-size: 20px;
    }
    @media (display-mode: standalone) {
      #installButton {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="loading" id="loadingIndicator">Memuat aplikasi...</div>
  
  <!-- TOMBOL INSTALL -->
  <button id="installButton">Install Aplikasi</button>

  <iframe 
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbzCvvye_fbtf2vuCOZJpsDGtatnOsdfBCXxF3gs5aUlNU1WKZjmPcQ3ACkJWvFFpWzq/exec"
    title="Aplikasi Arisan"
    allow="geolocation; camera; microphone; clipboard-read; clipboard-write; autoplay"
    allowfullscreen="true"
    loading="eager">
  </iframe>

  <script>
    // --- Loading Iframe ---
    const iframe = document.getElementById('appFrame');
    const loader = document.getElementById('loadingIndicator');
    
    iframe.addEventListener('load', function() {
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.style.display = 'none';
      }, 300);
    });
    
    iframe.addEventListener('error', function() {
      loader.innerHTML = 'Gagal memuat aplikasi. Periksa koneksi internet.';
      loader.style.backgroundColor = '#fee2e2';
      loader.style.color = '#b91c1c';
      loader.style.whiteSpace = 'normal';
      loader.style.width = 'auto';
    });

    // --- REGISTRASI SERVICE WORKER (PATH RELATIF) ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('✅ Service Worker registered', reg))
          .catch(err => console.log('❌ Service Worker registration failed', err));
      });
    }

    // --- LOGIKA TOMBOL INSTALL PWA ---
    let deferredPrompt;
    const installButton = document.getElementById('installButton');

    // Jangan tampilkan jika sudah standalone
    if (window.matchMedia('(display-mode: standalone)').matches) {
      installButton.style.display = 'none';
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installButton.style.display = 'flex';
      console.log('✅ beforeinstallprompt fired, tombol muncul');
    });

    installButton.addEventListener('click', async () => {
      if (!deferredPrompt) {
        alert('Untuk menginstal, gunakan menu "Tambahkan ke Layar Utama" di browser Anda.');
        return;
      }
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`User response: ${outcome}`);
      deferredPrompt = null;
      installButton.style.display = 'none';
    });

    window.addEventListener('appinstalled', () => {
      console.log('🎉 Aplikasi berhasil diinstal');
      installButton.style.display = 'none';
      deferredPrompt = null;
    });

    // Fallback: jika setelah 3 detik tombol belum muncul & bukan standalone,
    // tampilkan tombol dengan panduan manual (untuk iOS dll)
    setTimeout(() => {
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
      if (installButton.style.display === 'none' && !isStandalone) {
        installButton.style.display = 'flex';
        installButton.textContent = '📲 Tambah ke Layar Utama';
        installButton.onclick = () => {
          alert('Buka menu browser (⋮) lalu pilih "Tambahkan ke Layar Utama" atau "Install app".');
        };
      }
    }, 3000);
  </script>
</body>
</html>
